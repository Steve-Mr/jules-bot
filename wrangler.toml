name = "jules-tg-bot"
main = "src/index.ts"
compatibility_date = "2024-03-01"

# Variables defined here can be overridden in the Cloudflare Dashboard
[vars]
# TELEGRAM_TOKEN = "..."
# JULES_API_KEY = "..."
# ADMIN_USER_ID = "..."

# Optional: KV Namespace for notifications
# [[kv_namespaces]]
# binding = "JULES_NOTIFICATIONS_KV"
# id = "<your-kv-id>"

# Optional: Cron trigger for checking notifications (every 5 minutes)
# [triggers]
# crons = ["*/5 * * * *"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true
